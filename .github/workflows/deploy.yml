name: Build & Deploy

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            vothanhlam1793/report:latest
            vothanhlam1793/report:${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to SVR5
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SVR5_HOST }}
          username: root
          password: ${{ secrets.SVR5_PASSWORD }}
          script: |
            docker pull vothanhlam1793/report:${{ github.run_number }}
            docker stop REPORT || true
            docker rm REPORT || true
            docker run -d \
              --name REPORT \
              --restart unless-stopped \
              -p 30004:3000 \
              --env-file /root/.env.report \
              vothanhlam1793/report:${{ github.run_number }}
            docker image prune -f
